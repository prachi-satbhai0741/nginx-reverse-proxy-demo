events {
    worker_connections 1024;
}

http {

    # upstream block for load balancing across multiple instances of app1
    upstream app1_cluster {
        least_conn;
        server app1:3001;
    }

    upstream app2_service {
        server app2:3002;
    }

    upstream app3_service {
        server app3:3003;
    }

    # rate limiting zone: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # access and error logs
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # health check endpoint served by nginx itself
        location /health {
            access_log off;
            return 200 '{"status":"ok","proxy":"nginx"}';
            add_header Content-Type application/json;
        }

        # path-based routing: /service1/* → app1
        location /service1/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://app1_cluster/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # timeout settings
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # path-based routing: /service2/* → app2
        location /service2/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://app2_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # path-based routing: /service3/* → app3
        location /service3/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://app3_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # default: 404 for unmatched routes
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
