version: '3.9'

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - proxy-net
    restart: unless-stopped

  app1:
    build: ./app1
    container_name: service-app1
    expose:
      - "3001"
    networks:
      - proxy-net
    restart: unless-stopped

  app2:
    build: ./app2
    container_name: service-app2
    expose:
      - "3002"
    networks:
      - proxy-net
    restart: unless-stopped

  app3:
    build: ./app3
    container_name: service-app3
    expose:
      - "3003"
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    driver: bridge
